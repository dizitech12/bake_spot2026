<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Open Bake Spot</title>

<style>
body{
font-family: Arial;
background:#FDF6E9;
text-align:center;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 8px 24px rgba(0,0,0,0.08);
max-width:400px;
margin:auto;
}

button{
background:#E8A87C;
color:white;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:30px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#C38D6B;
}
</style>

<script>

function isInstagram(){
return navigator.userAgent.includes("Instagram");
}

function openSite(){
window.location.href="https://bake-spot2026.vercel.app";
}

window.onload=function(){

if(!isInstagram()){
openSite();
}

}

</script>

</head>

<body>

<div class="card">

<h2>🍰 Open Bake Spot Website</h2>

<p>
For smooth ordering experience,<br>
please open in your phone browser
</p>

<button onclick="openSite()">
Open Website
</button>

<p style="margin-top:15px;font-size:14px;">
Tap ⋮ top-right → Open in Browser
</p>

</div>

</body>
</html>
